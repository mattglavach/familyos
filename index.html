<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

    <!-- Apple PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FamilyOS" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Viewport: prevents scroll bounce, fills full screen on iPhone -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />

    <!-- Theme color: matches app navy background -->
    <meta name="theme-color" content="#0F1729" />
    <meta name="msapplication-TileColor" content="#0F1729" />

    <!-- Basic meta -->
    <meta name="description" content="FamilyOS - your family's personal operating system" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no" />

    <title>FamilyOS</title>

    <style>
      /* Prevent overscroll/bounce and ensure full-screen feel on iOS */
      html, body {
        margin: 0;
        padding: 0;
        background: #0F1729;
        overflow: hidden;
        position: fixed;
        width: 100%;
        height: 100%;
        -webkit-overflow-scrolling: touch;
      }
      #root {
        width: 100%;
        height: 100%;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        background: #0F1729;
      }
    </style>
  </head>
  <body>
    <noscript>FamilyOS requires JavaScript to run.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.js"></script>
  </body>
</html>
